name: security-pin-drift-monthly

on:
  schedule:
    - cron: "7 2 1 * *"
  workflow_dispatch:

jobs:
  security-pin-drift-monthly:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GLYPHSER_ENV: "ci"
      GLYPHSER_PROVENANCE_HMAC_KEY: ${{ secrets.GLYPHSER_PROVENANCE_HMAC_KEY || 'glyphser-provenance-hmac-fallback-v1' }}
      GLYPHSER_EVIDENCE_ROOT: evidence/runs/${{ github.run_id }}/security-pin-drift-monthly
      TZ: "UTC"
      LC_ALL: "C.UTF-8"
      LANG: "C.UTF-8"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: "3.12"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Initialize immutable evidence run directory
        run: python tooling/security/evidence_run_dir_guard.py --run-id "${{ github.run_id }}-security-pin-drift-monthly"
      - name: Workflow pin drift report
        run: python tooling/security/workflow_pin_drift_report.py
      - name: Upload monthly pin drift artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: security-pin-drift-monthly
          retention-days: 90
          path: |
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/workflow_pin_drift_report.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/workflow_pin_drift_report.json.sig
