name: security-token-scope-review

on:
  schedule:
    - cron: "17 3 1 * *"
  workflow_dispatch:

jobs:
  token-scope-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GLYPHSER_ENV: "ci"
      GLYPHSER_EVIDENCE_ROOT: evidence/runs/${{ github.run_id }}/security-token-scope-review
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: "3.12"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Initialize immutable evidence run directory
        run: python tooling/security/evidence_run_dir_guard.py --run-id "${{ github.run_id }}-security-token-scope-review"
      - name: Generate workflow token scope audit artifact
        run: python tooling/security/permissions_audit_artifact.py
      - name: Upload token scope review artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: security-token-scope-review-artifacts
          retention-days: 30
          path: |
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/permissions_audit_artifact.json
