name: emergency-lockdown

on:
  workflow_dispatch:

jobs:
  lockdown-verify:
    runs-on: ubuntu-latest
    environment: security-emergency-approval
    env:
      GLYPHSER_EVIDENCE_ROOT: evidence/runs/${{ github.run_id }}/emergency-lockdown
      GLYPHSER_PROVENANCE_HMAC_KEY: ${{ secrets.GLYPHSER_PROVENANCE_HMAC_KEY }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install -e .[dev]
      - name: Initialize immutable evidence run directory
        run: python tooling/security/evidence_run_dir_guard.py --run-id "${{ github.run_id }}-emergency-lockdown"
      - name: Verify emergency lockdown policy and signature
        run: python tooling/security/emergency_lockdown_gate.py
      - name: Upload emergency lockdown evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: emergency-lockdown-evidence
          path: |
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/emergency_lockdown_gate.json
