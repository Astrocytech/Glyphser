  airgap-simulation:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GLYPHSER_ENV: "ci"
      GLYPHSER_PROVENANCE_HMAC_KEY: ${{ secrets.GLYPHSER_PROVENANCE_HMAC_KEY || 'glyphser-provenance-hmac-fallback-v1' }}
      GLYPHSER_EVIDENCE_ROOT: evidence/runs/${{ github.run_id }}/airgap-simulation
      TZ: "UTC"
      LC_ALL: "C.UTF-8"
      LANG: "C.UTF-8"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: "3.12"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Initialize immutable evidence run directory
        run: python tooling/security/evidence_run_dir_guard.py --run-id "${{ github.run_id }}-airgap-simulation"
      - name: Prepare signed evidence for offline bundle
        run: |
          python tooling/security/security_artifacts.py
          python tooling/security/policy_signature_generate.py --strict-key
          python tooling/security/evidence_chain_of_custody.py --strict-key
      - name: Export offline verification bundle
        run: python tooling/security/export_offline_verify_bundle.py
      - name: Run offline verification in air-gap simulation
        run: |
          python tooling/security/offline_verify.py --bundle-dir evidence/security/offline_verify_bundle
          python tooling/security/offline_verification_gate.py
      - name: Upload air-gap simulation artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ github.job }}-${{ github.run_id }}-airgap-simulation-artifacts
          retention-days: 30
          path: |
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/offline_verify_bundle_export.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/offline_verification_gate.json
            evidence/security/offline_verify_bundle/offline_verify_report.json
