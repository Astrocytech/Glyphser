name: security-maintenance

on:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  security-maintenance:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GLYPHSER_ENV: "ci"
      GLYPHSER_PROVENANCE_HMAC_KEY: ${{ secrets.GLYPHSER_PROVENANCE_HMAC_KEY || 'glyphser-provenance-hmac-fallback-v1' }}
      GLYPHSER_PROVENANCE_KEY_ROTATED_AT: "2026-03-01T00:00:00+00:00"
      GLYPHSER_EVIDENCE_ROOT: evidence/runs/${{ github.run_id }}/security-maintenance
      GLYPHSER_RUN_CORRELATION_ID: ${{ github.run_id }}
      TZ: "UTC"
      LC_ALL: "C.UTF-8"
      LANG: "C.UTF-8"
      GLYPHSER_SECURITY_OWNER: ${{ vars.GLYPHSER_SECURITY_OWNER || 'security-owner@glyphser.local' }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: "3.12"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Install pinned security tools
        run: python tooling/security/install_security_toolchain.py
      - name: Security cache integrity gate
        run: python tooling/security/security_cache_integrity_gate.py
      - name: Ensure setuptools for Semgrep runtime
        run: python -m pip install --upgrade setuptools==75.8.0
      - name: Semgrep runtime preflight
        run: |
          semgrep --version
          python -c "import pkg_resources"
      - name: Initialize immutable evidence run directory
        run: python tooling/security/evidence_run_dir_guard.py --run-id "${{ github.run_id }}-security-maintenance"
      - name: Security toolchain gate
        run: python tooling/security/security_toolchain_gate.py
      - name: Toolchain dependency provenance gate
        run: python tooling/security/toolchain_dependency_provenance_gate.py
      - name: Toolchain source failover gate
        run: python tooling/security/toolchain_source_failover_gate.py
      - name: Python version policy gate
        run: python tooling/security/python_version_policy_gate.py
      - name: Workflow risky patterns gate
        run: python tooling/security/workflow_risky_patterns_gate.py
      - name: Required control condition bypass gate
        run: python tooling/security/required_control_condition_bypass_gate.py
      - name: Strict lane fail-closed control gate
        run: python tooling/security/strict_lane_fail_closed_control_gate.py
      - name: Warning lane degraded-mode artifact gate
        run: python tooling/security/warning_lane_degraded_mode_artifact_gate.py
      - name: Workflow change-management gate
        run: python tooling/security/workflow_change_management_gate.py
      - name: File mode change gate
        run: python tooling/security/file_mode_change_gate.py
      - name: Network endpoint documentation gate
        run: python tooling/security/network_endpoint_documentation_gate.py
      - name: Security rule baseline gate
        run: python tooling/security/security_rule_baseline_gate.py
      - name: Security fixture integrity gate
        run: python tooling/security/security_fixture_integrity_gate.py
      - name: On-call triage SLA drill gate
        run: python tooling/security/oncall_triage_sla_drill_gate.py
      - name: Simultaneous multi-gate failure triage drill
