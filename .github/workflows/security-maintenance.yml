name: security-maintenance

on:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

jobs:
  security-maintenance:
    runs-on: ubuntu-latest
    env:
      GLYPHSER_ENV: "ci"
      GLYPHSER_PROVENANCE_HMAC_KEY: "glyphser-provenance-hmac-fallback-v1"
      GLYPHSER_EVIDENCE_ROOT: evidence/runs/${{ github.run_id }}/security-maintenance
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@42375524a18f07eb0658ddf24b150a0f0f0b274f
        with:
          python-version: "3.12"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Install pinned security tools
        run: |
          python -m pip install --upgrade \
            bandit==1.9.4 \
            pip-audit==2.9.0 \
            semgrep==1.95.0
      - name: Initialize immutable evidence run directory
        run: python tooling/security/evidence_run_dir_guard.py --run-id "${{ github.run_id }}-security-maintenance"
      - name: Security toolchain gate
        run: python tooling/security/security_toolchain_gate.py
      - name: Policy signature gate
        run: python tooling/security/policy_signature_gate.py --strict-key
      - name: Dependency refresh report
        run: python tooling/security/dependency_refresh_report.py
      - name: pip-audit gate
        run: python tooling/security/pip_audit_gate.py
      - name: Secret scan gate
        run: python tooling/security/secret_scan_gate.py
      - name: Workflow pinning gate
        run: python tooling/security/workflow_pinning_gate.py
      - name: Incident response gate
        run: python tooling/security/incident_response_gate.py
      - name: Org secret backend gate
        run: python tooling/security/org_secret_backend_gate.py
      - name: Secret management gate
        run: python tooling/security/secret_management_gate.py
      - name: Production controls gate
        run: python tooling/security/production_controls_gate.py
      - name: Third-party pentest gate
        run: python tooling/security/third_party_pentest_gate.py --strict-key
      - name: Live integration verify
        env:
          GLYPHSER_WAF_HEALTH_URL: ${{ secrets.GLYPHSER_WAF_HEALTH_URL }}
          GLYPHSER_WAF_TOKEN: ${{ secrets.GLYPHSER_WAF_TOKEN }}
          GLYPHSER_SIEM_HEALTH_URL: ${{ secrets.GLYPHSER_SIEM_HEALTH_URL }}
          GLYPHSER_SIEM_TOKEN: ${{ secrets.GLYPHSER_SIEM_TOKEN }}
          GLYPHSER_PAGING_HEALTH_URL: ${{ secrets.GLYPHSER_PAGING_HEALTH_URL }}
          GLYPHSER_PAGING_TOKEN: ${{ secrets.GLYPHSER_PAGING_TOKEN }}
        run: python tooling/security/live_integrations_verify.py
      - name: Live rollout gate (strict)
        run: python tooling/security/live_rollout_gate.py --target live_integrations
      - name: Container provenance gate
        run: python tooling/security/container_provenance_gate.py
      - name: Security artifacts + attestation checks
        run: |
          python tooling/security/security_artifacts.py
          python tooling/security/abuse_telemetry_snapshot.py
          python tooling/security/abuse_telemetry_gate.py
          python tooling/security/evidence_attestation_index.py --strict-key
          python tooling/security/evidence_attestation_gate.py --strict-key
          python tooling/security/provenance_signature_gate.py --strict-key
          python tooling/security/slsa_attestation_gate.py
      - name: Upload maintenance artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: security-maintenance-artifacts
          path: |
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/dependency_outdated.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/pip_audit.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/secret_scan.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/workflow_pinning.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/policy_signature.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/security_toolchain.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/incident_response.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/org_secret_backend.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/secret_management.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/production_controls.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/third_party_pentest.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/live_integrations.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/live_rollout_gate.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/abuse_telemetry.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/container_provenance.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/evidence_attestation_index.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/evidence_attestation_index.json.sig
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/evidence_attestation_gate.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/provenance_signature.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/slsa_attestation.json
