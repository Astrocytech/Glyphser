name: security-baseline-update

on:
  workflow_dispatch:

jobs:
  baseline-update:
    runs-on: ubuntu-latest
    environment: security-baseline-approval
    env:
      GLYPHSER_EVIDENCE_ROOT: evidence/runs/${{ github.run_id }}/security-baseline-update
      GLYPHSER_PROVENANCE_HMAC_KEY: ${{ secrets.GLYPHSER_PROVENANCE_HMAC_KEY }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@42375524a18f07eb0658ddf24b150a0f0f0b274f
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install -e .[dev]
      - name: Initialize immutable evidence run directory
        run: python tooling/security/evidence_run_dir_guard.py --run-id "${{ github.run_id }}-security-baseline-update"
      - name: Generate signed baseline diff
        run: python tooling/security/security_baseline_diff.py
      - name: Upload baseline update evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: security-baseline-update
          path: |
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/security_baseline_diff.txt
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/security_baseline_diff.txt.sig
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/security_baseline_diff.json
