name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  branch-protection-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: "3.12"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Branch protection policy gate
        run: python tooling/security/branch_protection_policy_gate.py
      - name: Upload branch protection policy report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: branch-protection-policy
          retention-days: 14
          path: evidence/security/branch_protection_policy.json

  test-matrix:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run tests
        run: |
          pytest -q

      - name: Run tests with coverage (primary lane)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: |
          pytest -q --cov=glyphser --cov=runtime --cov=tooling/release --cov=tooling/quality_gates --cov-report=xml --cov-report=html --cov-report=term

      - name: Run lint and format checks
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: |
          ruff check .
          ruff format --check .

      - name: Run type checks
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: mypy --config-file mypy.ini

      - name: Run conformance gate
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: python tooling/conformance/cli.py run

      - name: Enforce per-module coverage minimums
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: python tooling/quality_gates/module_coverage_gate.py --coverage-file coverage.xml

      - name: Run spec-implementation congruence gate
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: python tooling/quality_gates/spec_impl_congruence_gate.py

      - name: Run interface stability SLA gate
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: python tooling/quality_gates/interface_stability_gate.py

      - name: Run runtime/tooling boundary gate
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: python tooling/quality_gates/runtime_tooling_boundary_gate.py

      - name: Run evidence storage policy gate
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: python tooling/quality_gates/evidence_storage_policy_gate.py

      - name: Run determinism matrix gate
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: python tooling/quality_gates/determinism_matrix_gate.py

      - name: Run schema evolution compatibility gate
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: python tooling/quality_gates/schema_evolution_gate.py

      - name: Run benchmark registry gate
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: python tooling/benchmarks/benchmark_registry_gate.py

      - name: Run benchmark trend gate
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: python tooling/benchmarks/benchmark_trend_gate.py

      - name: Generate traceability index
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: python tooling/release/generate_traceability_index.py

      - name: Generate evidence metadata catalog
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: python tooling/release/generate_evidence_metadata.py

      - name: Validate evidence metadata catalog
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: python tooling/quality_gates/evidence_metadata_gate.py

      - name: Archive evidence snapshot (retention automation)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: python tooling/release/archive_evidence.py --keep 10

      - name: Upload coverage XML
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: coverage-xml
          retention-days: 14
          path: coverage.xml
      - name: Upload coverage HTML
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: coverage-html
          retention-days: 14
          path: htmlcov/
      - name: Upload gate telemetry
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: gate-telemetry
          retention-days: 14
          path: evidence/gates/telemetry/

  determinism-matrix:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Run cross-platform determinism gate
        run: python tooling/quality_gates/determinism_matrix_gate.py

  security-matrix:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    env:
      GLYPHSER_ENV: "ci"
      GLYPHSER_PROVENANCE_HMAC_KEY: ${{ secrets.GLYPHSER_PROVENANCE_HMAC_KEY || 'glyphser-provenance-hmac-fallback-v1' }}
      GLYPHSER_PROVENANCE_KEY_ROTATED_AT: "2026-03-01T00:00:00+00:00"
      GLYPHSER_EVIDENCE_ROOT: evidence/runs/${{ github.run_id }}/security-matrix-${{ matrix.python-version }}
      TZ: "UTC"
      LC_ALL: "C.UTF-8"
      LANG: "C.UTF-8"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Install pinned security tools
        run: python tooling/security/install_security_toolchain.py
      - name: Semgrep runtime preflight
        run: |
          semgrep --version
          python -c "import pkg_resources"
      - name: Initialize immutable evidence run directory
        run: python tooling/security/evidence_run_dir_guard.py --run-id "${{ github.run_id }}-${{ matrix.python-version }}-security"
      - name: Security toolchain gate
        run: python tooling/security/security_toolchain_gate.py
      - name: Subprocess allowlist report
        run: python tooling/security/subprocess_allowlist_report.py
      - name: Subprocess direct usage gate
        run: python tooling/security/subprocess_direct_usage_gate.py
      - name: Security workflow contract gate
        run: python tooling/security/security_workflow_contract_gate.py
      - name: Security super gate manifest drift gate
        run: python tooling/security/security_super_gate_manifest_gate.py
      - name: Workflow artifact retention gate
        run: python tooling/security/workflow_artifact_retention_gate.py
      - name: Semgrep rules self-check gate
        run: python tooling/security/semgrep_rules_self_check_gate.py
      - name: Workflow policy coverage gate
        run: python tooling/security/workflow_policy_coverage_gate.py
      - name: Workflow risky patterns gate
        run: python tooling/security/workflow_risky_patterns_gate.py
      - name: Workflow deprecated invocation gate
        run: python tooling/security/workflow_deprecated_invocation_gate.py
      - name: Policy schema validation gate
        run: python tooling/security/policy_schema_validation_gate.py
      - name: Security schema migration tracker
        run: python tooling/security/security_schema_migration_tracker.py
      - name: Security schema strict readiness gate
        run: python tooling/security/security_schema_strict_readiness_gate.py
      - name: Security evidence corruption gate
        run: python tooling/security/security_evidence_corruption_gate.py
      - name: Security artifact signature coverage gate
        run: python tooling/security/security_artifact_signature_coverage_gate.py
      - name: Security workflow trigger gate
        run: python tooling/security/security_workflow_trigger_gate.py
      - name: Security critical test wiring gate
        run: python tooling/security/security_critical_test_wiring_gate.py
      - name: Security SARIF permissions gate
        run: python tooling/security/security_sarif_permissions_gate.py
      - name: Security workflow permissions policy gate
        run: python tooling/security/security_workflow_permissions_policy_gate.py
      - name: Security exception suppression gate
        run: python tooling/security/security_exception_suppression_gate.py
      - name: Security dead-gate wiring gate
        run: python tooling/security/security_dead_gate_wiring_gate.py
      - name: Hardening TODO consistency gate
        run: python tooling/security/hardening_todo_consistency_gate.py
      - name: Policy signature generate
        run: python tooling/security/policy_signature_generate.py --strict-key
      - name: Policy signature gate
        run: python tooling/security/policy_signature_gate.py --strict-key
      - name: Bandit
        run: bandit -q -c tooling/security/bandit.yaml -r glyphser runtime tooling -l -ii
      - name: Bandit (JSON)
        run: bandit -q -c tooling/security/bandit.yaml -r glyphser runtime tooling -f json -o bandit.json -l -ii
      - name: Convert Bandit JSON to SARIF
        run: python tooling/security/bandit_json_to_sarif.py --input bandit.json --output bandit.sarif
      - name: pip-audit gate
        run: python tooling/security/pip_audit_gate.py
      - name: Secret scan gate
        run: python tooling/security/secret_scan_gate.py
      - name: Workflow action pinning gate
        run: python tooling/security/workflow_pinning_gate.py
      - name: Incident response gate
        run: python tooling/security/incident_response_gate.py
      - name: Org secret backend gate
        run: python tooling/security/org_secret_backend_gate.py
      - name: Secret management gate
        run: python tooling/security/secret_management_gate.py
      - name: Production controls gate
        run: python tooling/security/production_controls_gate.py
      - name: Third-party pentest gate
        run: python tooling/security/third_party_pentest_gate.py --strict-key
      - name: Live integration verify (dry-run)
        run: python tooling/security/live_integrations_verify.py --dry-run
      - name: Live rollout gate (discovery mode)
        run: python tooling/security/live_rollout_gate.py --allow-dry-run --allow-missing
      - name: Container provenance gate
        run: python tooling/security/container_provenance_gate.py
      - name: Container registry provenance gate
        run: python tooling/security/container_registry_provenance_gate.py
      - name: Attestation digest match gate
        run: python tooling/security/attestation_digest_match_gate.py
      - name: Security artifacts
        run: python tooling/security/security_artifacts.py
      - name: Security unsigned JSON gate
        run: python tooling/security/security_unsigned_json_gate.py
      - name: Governance markdown gate
        run: python tooling/security/governance_markdown_gate.py
      - name: Review policy gate
        run: python tooling/security/review_policy_gate.py
      - name: File permissions gate
        run: python tooling/security/file_permissions_gate.py
      - name: Abuse telemetry snapshot
        run: python tooling/security/abuse_telemetry_snapshot.py
      - name: Runtime API state schema gate
        run: python tooling/security/runtime_api_state_schema_gate.py
      - name: Abuse telemetry gate
        run: python tooling/security/abuse_telemetry_gate.py
      - name: Temporary waiver gate
        run: python tooling/security/temporary_waiver_gate.py
      - name: Provenance revocation gate
        run: python tooling/security/provenance_revocation_gate.py
      - name: Security gate test coverage gate
        run: python tooling/security/security_gate_test_coverage_gate.py
      - name: Evidence attestation index
        run: python tooling/security/evidence_attestation_index.py --strict-key
      - name: Evidence attestation gate
        run: python tooling/security/evidence_attestation_gate.py --strict-key
      - name: Provenance signature gate
        run: python tooling/security/provenance_signature_gate.py --strict-key
      - name: Key provenance continuity gate
        run: python tooling/security/key_provenance_continuity_gate.py
      - name: Signature algorithm policy gate
        run: python tooling/security/signature_algorithm_policy_gate.py
      - name: Security verification summary
        run: python tooling/security/security_verification_summary.py --strict-key
      - name: SLSA attestation gate
        run: python tooling/security/slsa_attestation_gate.py
      - name: Workflow evidence scope gate
        run: python tooling/security/workflow_evidence_scope_gate.py
      - name: Conformance-security coupling gate
        run: python tooling/security/conformance_security_coupling_gate.py
      - name: Security super gate
        run: python tooling/security/security_super_gate.py --strict-key --strict-prereqs
      - name: Security SLO report
        run: python tooling/security/security_slo_report.py
      - name: Security trend gate
        run: python tooling/security/security_trend_gate.py
      - name: Security dashboard export
        run: python tooling/security/security_dashboard_export.py
      - name: Security schema normalization gate
        run: python tooling/security/security_schema_normalization_gate.py
      - name: External attestation gate
        run: python tooling/security/cosign_attestation_gate.py
      - name: Semgrep (SARIF)
        run: semgrep --config tooling/security/semgrep-rules.yml --error --sarif --output semgrep.sarif runtime glyphser tooling
      - name: Semgrep (JSON)
        run: semgrep --config tooling/security/semgrep-rules.yml --error --json --output semgrep.json runtime glyphser tooling
      - name: Semgrep rule regression tests
        run: pytest -q tests/security/test_semgrep_rules.py
      - name: Security targeted regression suite
        run: pytest -q tests/security
      - name: Upload Bandit SARIF to Code Scanning
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
        uses: github/codeql-action/upload-sarif@b56ba49b26e50535fa1e7f7db0f4f7b4bf65d80d
        with:
          sarif_file: bandit.sarif
      - name: Upload SARIF to Code Scanning
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
        uses: github/codeql-action/upload-sarif@b56ba49b26e50535fa1e7f7db0f4f7b4bf65d80d
        with:
          sarif_file: semgrep.sarif
      - name: Upload security artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: security-artifacts-${{ matrix.python-version }}
          retention-days: 14
          path: |
            bandit.sarif
            semgrep.sarif
            semgrep.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/pip_audit.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/secret_scan.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/workflow_pinning.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/policy_signature.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/security_toolchain.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/subprocess_allowlist_report.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/subprocess_direct_usage_gate.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/security_workflow_contract_gate.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/security_super_gate_manifest_gate.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/workflow_artifact_retention_gate.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/semgrep_rules_self_check_gate.json
