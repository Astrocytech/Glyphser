  security-gate-parity:
    needs: security-matrix
    runs-on: ubuntu-latest
    steps:
      - name: Download 3.11 security artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          name: security-artifacts-3.11
          path: parity/3.11
      - name: Download 3.12 security artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          name: security-artifacts-3.12
          path: parity/3.12
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: "3.12"
      - name: Compare security gate parity snapshots
        run: >
          python tooling/security/security_gate_parity_compare.py
          --left parity/3.11/security_gate_parity_snapshot.json
          --right parity/3.12/security_gate_parity_snapshot.json

  security-fs-permissions-parity:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      GLYPHSER_EVIDENCE_ROOT: evidence/runs/${{ github.run_id }}/security-fs-parity-${{ matrix.os }}
      TZ: "UTC"
      LC_ALL: "C.UTF-8"
      LANG: "C.UTF-8"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: "3.12"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Initialize immutable evidence run directory
        run: python tooling/security/evidence_run_dir_guard.py --run-id "${{ github.run_id }}-security-fs-parity-${{ matrix.os }}"
      - name: Filesystem permission parity gates
        run: |
          python tooling/security/file_permissions_gate.py
          python tooling/security/file_permission_matrix_gate.py
      - name: Upload filesystem parity artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: security-fs-permissions-parity-${{ matrix.os }}
          retention-days: 14
          path: |
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/file_permissions_gate.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/file_permission_matrix_gate.json

  security-fs-permissions-parity-report:
    runs-on: ubuntu-latest
    needs: [security-fs-permissions-parity]
    env:
      GLYPHSER_EVIDENCE_ROOT: evidence/runs/${{ github.run_id }}/security-fs-parity-report
      TZ: "UTC"
      LC_ALL: "C.UTF-8"
      LANG: "C.UTF-8"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: "3.12"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Download ubuntu filesystem parity artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          name: security-fs-permissions-parity-ubuntu-latest
          path: parity/ubuntu
      - name: Download macOS filesystem parity artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          name: security-fs-permissions-parity-macos-latest
          path: parity/macos
      - name: Generate filesystem permission parity report
        run: >
          python tooling/security/filesystem_permission_parity_report.py
          --left parity/ubuntu/file_permission_matrix_gate.json
          --right parity/macos/file_permission_matrix_gate.json
          --left-label ubuntu-latest
          --right-label macos-latest
      - name: Upload filesystem permission parity report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: security-fs-permissions-parity-report
          retention-days: 14
          path: |
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/filesystem_permission_parity_report.json

  security-tooling-smoke-matrix:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      GLYPHSER_ENV: "ci"
      GLYPHSER_PROVENANCE_HMAC_KEY: "glyphser-provenance-hmac-fallback-v1"
      GLYPHSER_EVIDENCE_ROOT: evidence/runs/${{ github.run_id }}/security-tooling-smoke-${{ matrix.os }}
      TZ: "UTC"
      LC_ALL: "C.UTF-8"
      LANG: "C.UTF-8"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: "3.12"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Install pinned security tools
        run: python tooling/security/install_security_toolchain.py
      - name: Security cache integrity gate
        run: python tooling/security/security_cache_integrity_gate.py
      - name: Ensure setuptools for Semgrep runtime
        run: python -m pip install --upgrade setuptools==75.8.0
      - name: Semgrep runtime preflight
        run: |
          semgrep --version
          python -c "import pkg_resources"
      - name: Initialize immutable evidence run directory
        run: python tooling/security/evidence_run_dir_guard.py --run-id "${{ github.run_id }}-security-tooling-smoke-${{ matrix.os }}"
      - name: Security tooling smoke gates
        run: |
          python tooling/security/security_toolchain_gate.py
          python tooling/security/toolchain_dependency_provenance_gate.py
          python tooling/security/toolchain_source_failover_gate.py
          python tooling/security/python_version_policy_gate.py
          python tooling/security/semgrep_rules_self_check_gate.py
          python tooling/security/runtime_api_scope_matrix_gate.py
          python tooling/security/security_event_schema_gate.py
          python tooling/security/security_super_gate.py --strict-prereqs
          python tooling/security/security_gate_runtime_budget_gate.py
          python tooling/security/signed_json_hash_equivalence_gate.py
          python tooling/security/locale_variance_suite.py
          python tooling/security/security_gate_parity_snapshot.py
      - name: Upload security tooling smoke artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: security-tooling-smoke-${{ matrix.os }}
          retention-days: 14
          path: |
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/security_toolchain.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/security_toolchain_install_report.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/security_cache_integrity_gate.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/toolchain_dependency_provenance_gate.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/toolchain_source_failover_gate.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/toolchain_source_failover_history.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/python_version_policy_gate.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/runtime_api_scope_matrix_gate.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/security_event_schema_gate.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/security_super_gate.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/security_gate_runtime_budget_gate.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/security_gate_runtime_history.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/signed_json_hash_equivalence_gate.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/locale_variance_suite.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/security_gate_parity_snapshot.json

  security-signed-json-hash-equivalence:
    needs: security-tooling-smoke-matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: "3.12"
      - name: Download linux tooling smoke artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          name: security-tooling-smoke-ubuntu-latest
          path: parity/linux
      - name: Download macOS tooling smoke artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          name: security-tooling-smoke-macos-latest
          path: parity/macos
      - name: Compare signed JSON hash equivalence across OS
        run: |
          left="$(find parity/linux -name signed_json_hash_equivalence_gate.json | head -n 1)"
          right="$(find parity/macos -name signed_json_hash_equivalence_gate.json | head -n 1)"
          if [ -z \"$left\" ] || [ -z \"$right\" ]; then
            echo \"missing signed_json_hash_equivalence_gate.json snapshot artifact\"
            exit 1
          fi
          python tooling/security/signed_json_hash_equivalence_gate.py --left \"$left\" --right \"$right\"
      - name: Compare canonical JSON artifact hashes across OS
        run: |
          python tooling/security/canonical_json_cross_os_artifact_hash_gate.py \
            --left-dir parity/linux \
            --right-dir parity/macos
