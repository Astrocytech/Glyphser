            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/security_evidence_corruption_gate.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/security_artifact_signature_coverage_gate.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/security_unsigned_json_gate.json
