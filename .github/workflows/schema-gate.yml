name: schema-gate

on:
  push:
    paths:
      - "specs/schemas/**"
      - "docs/**"
      - "tooling/quality_gates/schema_gate.py"
  pull_request:
    paths:
      - "specs/schemas/**"
      - "docs/**"
      - "tooling/quality_gates/schema_gate.py"

jobs:
  schema-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Setup Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: "3.12"
      - name: Run schema gate
        run: python tooling/quality_gates/schema_gate.py
