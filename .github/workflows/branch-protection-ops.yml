name: branch-protection-ops

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "owner/repo"
        required: true
      branch:
        description: "target branch"
        required: true
        default: "main"
      apply:
        description: "apply rules (true) or dry-run only (false)"
        required: true
        default: "false"

jobs:
  branch-protection-ops:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@42375524a18f07eb0658ddf24b150a0f0f0b274f
        with:
          python-version: "3.12"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Apply branch protection (optional)
        if: ${{ github.event.inputs.apply == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.BRANCH_PROTECTION_ADMIN_TOKEN }}
        run: |
          python tooling/security/apply_branch_protection.py \
            --repo "${{ github.event.inputs.repo }}" \
            --branch "${{ github.event.inputs.branch }}"
      - name: Verify live branch protection
        if: ${{ github.event.inputs.apply == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.BRANCH_PROTECTION_ADMIN_TOKEN }}
        run: |
          python tooling/security/verify_branch_protection_live.py \
            --repo "${{ github.event.inputs.repo }}" \
            --branch "${{ github.event.inputs.branch }}"
      - name: Verify live rollout evidence (branch protection)
        if: ${{ github.event.inputs.apply == 'true' }}
        run: python tooling/security/live_rollout_gate.py --target branch_protection
      - name: Upload branch protection evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: branch-protection-live
          path: |
            evidence/security/branch_protection_live.json
            evidence/security/live_rollout_gate.json
