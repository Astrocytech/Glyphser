name: security-audit-archive

on:
  schedule:
    - cron: "11 2 * * 0"
  workflow_dispatch:

jobs:
  audit-archive:
    runs-on: ubuntu-latest
    env:
      GLYPHSER_EVIDENCE_ROOT: evidence/runs/${{ github.run_id }}/security-audit-archive
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@42375524a18f07eb0658ddf24b150a0f0f0b274f
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install -e .[dev]
      - name: Initialize immutable evidence run directory
        run: python tooling/security/evidence_run_dir_guard.py --run-id "${{ github.run_id }}-security-audit-archive"
      - name: Archive and restore-verify audit log
        run: python tooling/security/audit_archive_verify.py
      - name: Upload audit archive evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: security-audit-archive
          path: |
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/audit-log-archive.tar.gz
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/audit_archive_verify.json
