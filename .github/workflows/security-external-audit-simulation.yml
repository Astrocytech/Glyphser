name: security-external-audit-simulation

on:
  schedule:
    - cron: "17 4 1 * *"
  workflow_dispatch:

jobs:
  external-audit-simulation:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GLYPHSER_ENV: "ci"
      GLYPHSER_PROVENANCE_HMAC_KEY: ${{ secrets.GLYPHSER_PROVENANCE_HMAC_KEY || 'glyphser-provenance-hmac-fallback-v1' }}
      GLYPHSER_PROVENANCE_KEY_ROTATED_AT: "2026-03-01T00:00:00+00:00"
      GLYPHSER_EVIDENCE_ROOT: evidence/runs/${{ github.run_id }}/security-external-audit-simulation
      TZ: "UTC"
      LC_ALL: "C.UTF-8"
      LANG: "C.UTF-8"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: "3.12"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Initialize immutable evidence run directory
        run: python tooling/security/evidence_run_dir_guard.py --run-id "${{ github.run_id }}-security-external-audit-simulation"
      - name: External audit simulation
        run: python tooling/security/external_audit_simulation.py --audit-id "AUDIT-${{ github.run_id }}"
      - name: Upload external audit simulation artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: security-external-audit-simulation
          retention-days: 30
          path: |
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/external_audit_simulation.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/external_audit_simulation_closure.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/offline_verify_bundle_export.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/independent_verifier_profile_gate.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/long_term_retention_manifest.json
