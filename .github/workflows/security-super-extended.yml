name: security-super-extended

on:
  schedule:
    - cron: "23 3 * * 2"
  workflow_dispatch:

jobs:
  security-super-extended:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GLYPHSER_ENV: "ci"
      GLYPHSER_PROVENANCE_HMAC_KEY: ${{ secrets.GLYPHSER_PROVENANCE_HMAC_KEY || 'glyphser-provenance-hmac-fallback-v1' }}
      GLYPHSER_PROVENANCE_KEY_ROTATED_AT: "2026-03-01T00:00:00+00:00"
      GLYPHSER_EVIDENCE_ROOT: evidence/runs/${{ github.run_id }}/security-super-extended
      TZ: "UTC"
      LC_ALL: "C.UTF-8"
      LANG: "C.UTF-8"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: "3.12"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Install pinned security tools
        run: python tooling/security/install_security_toolchain.py
      - name: Semgrep runtime preflight
        run: |
          semgrep --version
          python -c "import pkg_resources"
      - name: Initialize immutable evidence run directory
        run: python tooling/security/evidence_run_dir_guard.py --run-id "${{ github.run_id }}-security-super-extended"
      - name: Security super gate (extended)
        run: python tooling/security/security_super_gate.py --strict-key --strict-prereqs --include-extended
      - name: Upload extended super gate artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: security-super-extended-artifacts
          retention-days: 30
          path: |
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/security_super_gate.json
