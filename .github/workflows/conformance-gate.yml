name: conformance-gate

on:
  push:
    paths:
      - "specs/contracts/**"
      - "docs/**"
      - "tooling/**"
      - "runtime/**"
      - "tests/**"
      - "artifacts/**"
      - "evidence/**"
      - "specs/**"
  pull_request:
    paths:
      - "specs/contracts/**"
      - "docs/**"
      - "tooling/**"
      - "runtime/**"
      - "tests/**"
      - "artifacts/**"
      - "evidence/**"
      - "specs/**"

jobs:
  conformance:
    runs-on: ubuntu-latest
    env:
      GLYPHSER_ENV: "ci"
      GLYPHSER_PROVENANCE_HMAC_KEY: ${{ secrets.GLYPHSER_PROVENANCE_HMAC_KEY || 'glyphser-provenance-hmac-fallback-v1' }}
      GLYPHSER_PROVENANCE_KEY_ROTATED_AT: "2026-03-01T00:00:00+00:00"
      GLYPHSER_EVIDENCE_ROOT: evidence/runs/${{ github.run_id }}/conformance
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Setup Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e .
      - name: Initialize immutable evidence run directory
        run: python tooling/security/evidence_run_dir_guard.py --run-id "${{ github.run_id }}-conformance"
      - name: Run conformance
        run: |
          python tooling/conformance/cli.py run
          python tooling/conformance/cli.py report
      - name: Security linkage checks
        run: |
          python tooling/security/policy_signature_generate.py --strict-key
          python tooling/security/policy_signature_gate.py --strict-key
          python tooling/security/security_artifacts.py
          python tooling/security/evidence_attestation_index.py --strict-key
          python tooling/security/evidence_attestation_gate.py --strict-key
          python tooling/security/conformance_security_coupling_gate.py
      - name: Upload conformance + security evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: conformance-security-evidence
          path: |
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/conformance/results/latest.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/conformance/reports/latest.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/policy_signature.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/evidence_attestation_index.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/evidence_attestation_index.json.sig
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/evidence_attestation_gate.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/conformance_security_coupling.json

  hello-core:
    runs-on: ubuntu-latest
    env:
      GLYPHSER_EVIDENCE_ROOT: evidence/runs/${{ github.run_id }}/hello-core
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Setup Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e .
      - name: Initialize immutable evidence run directory
        run: python tooling/security/evidence_run_dir_guard.py --run-id "${{ github.run_id }}-hello-core"
      - name: Run hello-core
        run: python tooling/scripts/run_hello_core.py
