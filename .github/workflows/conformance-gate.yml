name: conformance-gate

on:
  push:
    paths:
      - "specs/contracts/**"
      - "docs/**"
      - "tooling/**"
      - "runtime/**"
      - "tests/**"
      - "artifacts/**"
      - "evidence/**"
      - "specs/**"
  pull_request:
    paths:
      - "specs/contracts/**"
      - "docs/**"
      - "tooling/**"
      - "runtime/**"
      - "tests/**"
      - "artifacts/**"
      - "evidence/**"
      - "specs/**"

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e .
      - name: Run conformance
        run: |
          python tooling/conformance/cli.py run
          python tooling/conformance/cli.py report

  hello-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e .
      - name: Run hello-core
        run: python tooling/scripts/run_hello_core.py
