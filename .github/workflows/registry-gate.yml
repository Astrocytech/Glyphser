name: registry-gate

on:
  push:
    paths:
      - "specs/layers/L1-foundation/API-Interfaces.md"
      - "specs/contracts/operator_registry.json"
      - "specs/contracts/error_codes.json"
      - "tooling/quality_gates/registry_gate.py"
  pull_request:
    paths:
      - "specs/layers/L1-foundation/API-Interfaces.md"
      - "specs/contracts/operator_registry.json"
      - "specs/contracts/error_codes.json"
      - "tooling/quality_gates/registry_gate.py"

jobs:
  registry-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Setup Python
        uses: actions/setup-python@42375524a18f07eb0658ddf24b150a0f0f0b274f
        with:
          python-version: "3.12"
      - name: Run registry gate
        run: python tooling/quality_gates/registry_gate.py
