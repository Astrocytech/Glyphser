name: security-live-integrations

on:
  schedule:
    - cron: "11 2 * * 2"
  workflow_dispatch:

jobs:
  live-integrations:
    runs-on: ubuntu-latest
    env:
      GLYPHSER_ENV: "ci"
      GLYPHSER_PROVENANCE_HMAC_KEY: ${{ secrets.GLYPHSER_PROVENANCE_HMAC_KEY }}
      GLYPHSER_EVIDENCE_ROOT: evidence/runs/${{ github.run_id }}/security-live-integrations
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: "3.12"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Initialize immutable evidence run directory
        run: python tooling/security/evidence_run_dir_guard.py --run-id "${{ github.run_id }}-security-live-integrations"
      - name: Verify live integrations
        env:
          GLYPHSER_WAF_HEALTH_URL: ${{ secrets.GLYPHSER_WAF_HEALTH_URL }}
          GLYPHSER_WAF_TOKEN: ${{ secrets.GLYPHSER_WAF_TOKEN }}
          GLYPHSER_SIEM_HEALTH_URL: ${{ secrets.GLYPHSER_SIEM_HEALTH_URL }}
          GLYPHSER_SIEM_TOKEN: ${{ secrets.GLYPHSER_SIEM_TOKEN }}
          GLYPHSER_PAGING_HEALTH_URL: ${{ secrets.GLYPHSER_PAGING_HEALTH_URL }}
          GLYPHSER_PAGING_TOKEN: ${{ secrets.GLYPHSER_PAGING_TOKEN }}
        run: python tooling/security/live_integrations_verify.py
      - name: Verify live rollout evidence (integrations)
        run: python tooling/security/live_rollout_gate.py --target live_integrations
      - name: Upload live integration evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: live-integrations
          path: |
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/live_integrations.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/live_rollout_gate.json
