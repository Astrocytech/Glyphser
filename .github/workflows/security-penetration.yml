name: security-penetration

on:
  schedule:
    - cron: "23 3 1 * *"
  workflow_dispatch:

jobs:
  penetration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@42375524a18f07eb0658ddf24b150a0f0f0b274f
        with:
          python-version: "3.12"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Run penetration scenarios
        run: python -m pytest -q tests/security/test_penetration_scenarios.py
      - name: Upload penetration evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: security-penetration-evidence
          path: tests/security/test_penetration_scenarios.py
