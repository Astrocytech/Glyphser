name: security-penetration

on:
  schedule:
    - cron: "23 3 1 * *"
  workflow_dispatch:

jobs:
  penetration:
    runs-on: ubuntu-latest
    env:
      GLYPHSER_EVIDENCE_ROOT: evidence/runs/${{ github.run_id }}/security-penetration
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: "3.12"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Initialize immutable evidence run directory
        run: python tooling/security/evidence_run_dir_guard.py --run-id "${{ github.run_id }}-security-penetration"
      - name: Run penetration scenarios
        run: python -m pytest -q tests/security/test_penetration_scenarios.py
      - name: Upload penetration evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: security-penetration-evidence
          path: tests/security/test_penetration_scenarios.py
