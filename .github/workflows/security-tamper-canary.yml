name: security-tamper-canary

on:
  schedule:
    - cron: "29 3 * * 2"
  workflow_dispatch:

jobs:
  tamper-canary:
    runs-on: ubuntu-latest
    env:
      GLYPHSER_ENV: "ci"
      GLYPHSER_PROVENANCE_HMAC_KEY: ${{ secrets.GLYPHSER_PROVENANCE_HMAC_KEY }}
      GLYPHSER_EVIDENCE_ROOT: evidence/runs/${{ github.run_id }}/security-tamper-canary
      TZ: "UTC"
      LC_ALL: "C.UTF-8"
      LANG: "C.UTF-8"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@42375524a18f07eb0658ddf24b150a0f0f0b274f
        with:
          python-version: "3.12"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Initialize immutable evidence run directory
        run: python tooling/security/evidence_run_dir_guard.py --run-id "${{ github.run_id }}-security-tamper-canary"
      - name: Generate synthetic tamper canary report
        run: |
          mkdir -p "${GLYPHSER_EVIDENCE_ROOT}/security"
          cat > "${GLYPHSER_EVIDENCE_ROOT}/security/tamper_canary_report.json" <<'JSON'
          {
            "reason_codes": [
              "policy_signature_tamper",
              "evidence_index_tamper",
              "provenance_signature_tamper"
            ]
          }
          JSON
      - name: Tamper canary gate
        run: python tooling/security/tamper_canary_gate.py
      - name: Upload tamper canary artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: security-tamper-canary-artifacts
          path: |
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/tamper_canary_report.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/tamper_canary_gate.json
