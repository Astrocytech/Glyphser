name: reproducible-build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  reproducible-build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@42375524a18f07eb0658ddf24b150a0f0f0b274f
        with:
          python-version: "3.12"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Reproducible build gate
        run: python tooling/security/reproducible_build_gate.py
      - name: Upload reproducible build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: reproducible-build-${{ matrix.os }}
          path: evidence/security/reproducible_build.json
