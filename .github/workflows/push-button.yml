name: push-button

on:
  push:
    paths:
      - "specs/contracts/**"
      - "docs/**"
      - "specs/schemas/**"
      - "runtime/**"
      - "tests/**"
      - "tooling/**"
      - "artifacts/**"
      - "evidence/**"
      - "specs/**"
      - "governance/**"
      - "product/**"
      - "distribution/**"
  pull_request:
    paths:
      - "specs/contracts/**"
      - "docs/**"
      - "specs/schemas/**"
      - "runtime/**"
      - "tests/**"
      - "tooling/**"
      - "artifacts/**"
      - "evidence/**"
      - "specs/**"
      - "governance/**"
      - "product/**"
      - "distribution/**"

jobs:
  push-button:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Setup Python
        uses: actions/setup-python@42375524a18f07eb0658ddf24b150a0f0f0b274f
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e .
      - name: Run push-button pipeline
        run: python tooling/commands/push_button.py
      - name: Check codegen drift
        run: |
          python tooling/codegen/cleanroom_validation_generate.py
          python tooling/codegen/diff_fidelity.py
      - name: Upload release checksum
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: hello-core-bundle-sha256
          path: artifacts/bundles/hello-core-bundle.sha256
