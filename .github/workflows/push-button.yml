name: push-button

on:
  push:
    paths:
      - "contracts/**"
      - "docs/**"
      - "schemas/**"
      - "src/**"
      - "tests/**"
      - "tooling/**"
      - "artifacts/**"
      - "evidence/**"
      - "runtime/**"
      - "specs/**"
      - "governance/**"
      - "product/**"
      - "distribution/**"
  pull_request:
    paths:
      - "contracts/**"
      - "docs/**"
      - "schemas/**"
      - "src/**"
      - "tests/**"
      - "tooling/**"
      - "artifacts/**"
      - "evidence/**"
      - "runtime/**"
      - "specs/**"
      - "governance/**"
      - "product/**"
      - "distribution/**"

jobs:
  push-button:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e .
      - name: Run push-button pipeline
        run: python tooling/push_button.py
      - name: Check codegen drift
        run: |
          python tooling/codegen/clean_build_generate.py
          python tooling/codegen/diff_fidelity.py
      - name: Upload release checksum
        uses: actions/upload-artifact@v4
        with:
          name: hello-core-bundle-sha256
          path: artifacts/bundles/hello-core-bundle.sha256
