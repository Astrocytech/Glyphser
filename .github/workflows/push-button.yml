name: push-button

on:
  push:
    paths:
      - "specs/contracts/**"
      - "docs/**"
      - "specs/schemas/**"
      - "runtime/**"
      - "tests/**"
      - "tooling/**"
      - "artifacts/**"
      - "evidence/**"
      - "specs/**"
      - "governance/**"
      - "product/**"
      - "distribution/**"
  pull_request:
    paths:
      - "specs/contracts/**"
      - "docs/**"
      - "specs/schemas/**"
      - "runtime/**"
      - "tests/**"
      - "tooling/**"
      - "artifacts/**"
      - "evidence/**"
      - "specs/**"
      - "governance/**"
      - "product/**"
      - "distribution/**"

jobs:
  push-button:
    runs-on: ubuntu-latest
    env:
      GLYPHSER_ENV: "ci"
      GLYPHSER_PROVENANCE_HMAC_KEY: ${{ secrets.GLYPHSER_PROVENANCE_HMAC_KEY || 'glyphser-provenance-hmac-fallback-v1' }}
      GLYPHSER_PROVENANCE_KEY_ROTATED_AT: "2026-03-01T00:00:00+00:00"
      GLYPHSER_EVIDENCE_ROOT: evidence/runs/${{ github.run_id }}/push-button
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Setup Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e .
      - name: Initialize immutable evidence run directory
        run: python tooling/security/evidence_run_dir_guard.py --run-id "${{ github.run_id }}-push-button"
      - name: Policy signature generate
        run: python tooling/security/policy_signature_generate.py --strict-key
      - name: Policy signature gate
        run: python tooling/security/policy_signature_gate.py --strict-key
      - name: Run push-button pipeline
        run: python tooling/commands/push_button.py
      - name: Check codegen drift
        run: |
          python tooling/codegen/cleanroom_validation_generate.py
          python tooling/codegen/diff_fidelity.py
      - name: Upload release checksum
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: hello-core-bundle-sha256
          path: artifacts/bundles/hello-core-bundle.sha256
