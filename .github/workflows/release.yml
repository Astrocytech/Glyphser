name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      publish_pypi:
        description: "Publish built artifacts to PyPI (requires trusted publishing setup)"
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GLYPHSER_ENV: "release"
      GLYPHSER_PROVENANCE_HMAC_KEY: ${{ secrets.GLYPHSER_PROVENANCE_HMAC_KEY || 'glyphser-provenance-hmac-fallback-v1' }}
      GLYPHSER_PROVENANCE_KEY_ROTATED_AT: "2026-03-01T00:00:00+00:00"
      GLYPHSER_EVIDENCE_ROOT: evidence/runs/${{ github.run_id }}/release-build
      TZ: "UTC"
      LC_ALL: "C.UTF-8"
      LANG: "C.UTF-8"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: "3.12"
      - name: Build dist
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Generate release checksums
        run: |
          cd dist
          sha256sum * > CHECKSUMS.sha256
      - name: Initialize immutable evidence run directory
        run: python tooling/security/evidence_run_dir_guard.py --run-id "${{ github.run_id }}-release-build"
      - name: Generate SBOM and provenance
        env:
          GLYPHSER_STRICT_SIGNING: "true"
        run: python tooling/security/security_artifacts.py
      - name: Verify provenance signatures (strict)
        run: python tooling/security/provenance_signature_gate.py --strict-key
      - name: Policy signature generate
        run: python tooling/security/policy_signature_generate.py --strict-key
      - name: Policy signature gate
        run: python tooling/security/policy_signature_gate.py --strict-key
      - name: Verify SLSA attestation
        run: python tooling/security/slsa_attestation_gate.py
      - name: Secret management gate
        run: python tooling/security/secret_management_gate.py
      - name: Org secret backend gate
        run: python tooling/security/org_secret_backend_gate.py
      - name: Production controls gate
        run: python tooling/security/production_controls_gate.py
      - name: Third-party pentest gate
        run: python tooling/security/third_party_pentest_gate.py --strict-key
      - name: Live rollout gate (strict)
        run: python tooling/security/live_rollout_gate.py --profile release
      - name: Container provenance gate
        env:
          GLYPHSER_CONTAINER_PUBLISHING_ENABLED: "true"
        run: python tooling/security/container_provenance_gate.py
      - name: Governance markdown gate
        run: python tooling/security/governance_markdown_gate.py
      - name: Review policy gate
        run: python tooling/security/review_policy_gate.py
      - name: File permissions gate
        run: python tooling/security/file_permissions_gate.py
      - name: Abuse telemetry snapshot + gate
        run: |
          python tooling/security/abuse_telemetry_snapshot.py
          python tooling/security/abuse_telemetry_gate.py
      - name: Temporary waiver gate
        run: python tooling/security/temporary_waiver_gate.py
      - name: Provenance revocation gate
        run: python tooling/security/provenance_revocation_gate.py
      - name: Evidence attestation index + gate
        run: |
          python tooling/security/evidence_attestation_index.py --strict-key
          python tooling/security/evidence_attestation_gate.py --strict-key
      - name: Workflow evidence scope gate
        run: python tooling/security/workflow_evidence_scope_gate.py
      - name: Conformance-security coupling gate
        run: python tooling/security/conformance_security_coupling_gate.py
      - name: Security super gate
        run: python tooling/security/security_super_gate.py --strict-key --strict-prereqs
      - name: Security SLO report
        run: python tooling/security/security_slo_report.py
      - name: Security trend gate
        run: python tooling/security/security_trend_gate.py
      - name: Security dashboard export
        run: python tooling/security/security_dashboard_export.py
      - name: Security schema normalization gate
        run: python tooling/security/security_schema_normalization_gate.py
      - name: External attestation gate
        run: python tooling/security/cosign_attestation_gate.py
      - name: Release rollback provenance gate
        run: python tooling/security/release_rollback_provenance_gate.py
      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: dist
          path: |
            dist/
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/sbom.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/sbom.json.sig
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/build_provenance.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/build_provenance.json.sig
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/slsa_provenance_v1.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/slsa_provenance_v1.json.sig
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/provenance_signature.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/slsa_attestation.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/policy_signature.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/org_secret_backend.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/secret_management.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/production_controls.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/governance_markdown_gate.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/review_policy_gate.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/file_permissions_gate.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/key_management.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/report_secret_leak.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/third_party_pentest.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/live_rollout_gate.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/abuse_telemetry.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/temporary_waiver_gate.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/provenance_revocation_gate.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/container_provenance.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/evidence_attestation_index.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/evidence_attestation_index.json.sig
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/evidence_attestation_gate.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/workflow_evidence_scope_gate.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/conformance_security_coupling.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/security_super_gate.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/security_slo_report.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/security_trend_gate.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/security_dashboard.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/security_schema_normalization_gate.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/cosign_attestation_gate.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/release_rollback_provenance_gate.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/evidence_chain_of_custody.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/evidence_chain_of_custody.json.sig
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/evidence_chain_of_custody_build.json
            ${{ env.GLYPHSER_EVIDENCE_ROOT }}/security/evidence_chain_of_custody_gate.json

  verify-signatures:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GLYPHSER_ENV: "release"
      GLYPHSER_PROVENANCE_HMAC_KEY: ${{ secrets.GLYPHSER_PROVENANCE_HMAC_KEY || 'glyphser-provenance-hmac-fallback-v1' }}
      GLYPHSER_PROVENANCE_KEY_ROTATED_AT: "2026-03-01T00:00:00+00:00"
      GLYPHSER_EVIDENCE_ROOT: evidence/runs/${{ github.run_id }}/release-verify
      TZ: "UTC"
      LC_ALL: "C.UTF-8"
      LANG: "C.UTF-8"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: "3.12"
      - name: Re-generate and verify provenance signatures (strict)
        env:
          GLYPHSER_STRICT_SIGNING: "true"
        run: |
          python tooling/security/evidence_run_dir_guard.py --run-id "${{ github.run_id }}-release-verify"
          python tooling/security/security_artifacts.py
          python tooling/security/provenance_signature_gate.py --strict-key
          python tooling/security/slsa_attestation_gate.py
          python tooling/security/policy_signature_generate.py --strict-key
          python tooling/security/policy_signature_gate.py --strict-key
          python tooling/security/org_secret_backend_gate.py
          python tooling/security/secret_management_gate.py
          python tooling/security/production_controls_gate.py
          python tooling/security/third_party_pentest_gate.py --strict-key
          python tooling/security/governance_markdown_gate.py
          python tooling/security/review_policy_gate.py
          python tooling/security/file_permissions_gate.py
          python tooling/security/live_rollout_gate.py --profile release
          GLYPHSER_CONTAINER_PUBLISHING_ENABLED=true \
          python tooling/security/container_provenance_gate.py
          python tooling/security/abuse_telemetry_snapshot.py
          python tooling/security/abuse_telemetry_gate.py
          python tooling/security/temporary_waiver_gate.py
          python tooling/security/provenance_revocation_gate.py
          python tooling/security/evidence_attestation_index.py --strict-key
          python tooling/security/evidence_attestation_gate.py --strict-key
          python tooling/security/workflow_evidence_scope_gate.py
          python tooling/security/conformance_security_coupling_gate.py
          python tooling/security/security_super_gate.py --strict-key --strict-prereqs
          python tooling/security/security_slo_report.py
          python tooling/security/security_trend_gate.py
          python tooling/security/security_dashboard_export.py
          python tooling/security/security_schema_normalization_gate.py
          python tooling/security/cosign_attestation_gate.py
          python tooling/security/release_rollback_provenance_gate.py

  publish-pypi:
    needs: [build, verify-signatures]
    if: ${{ vars.PUBLISH_PYPI == 'true' || github.event.inputs.publish_pypi == 'true' }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: "3.12"
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine upload --non-interactive dist/*

  publish-pypi-skipped:
    needs: build
    if: ${{ !(vars.PUBLISH_PYPI == 'true' || github.event.inputs.publish_pypi == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - name: PyPI publish disabled
        run: |
          echo "PyPI publish step skipped."
          echo "Set repository variable PUBLISH_PYPI=true or run workflow_dispatch with publish_pypi=true."
