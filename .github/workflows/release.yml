name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      publish_pypi:
        description: "Publish built artifacts to PyPI (requires trusted publishing setup)"
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build dist
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Generate release checksums
        run: |
          cd dist
          sha256sum * > CHECKSUMS.sha256
      - name: Generate SBOM and provenance
        run: python tooling/security/security_artifacts.py
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            dist/
            evidence/security/sbom.json
            evidence/security/build_provenance.json

  publish-pypi:
    needs: build
    if: ${{ vars.PUBLISH_PYPI == 'true' || github.event.inputs.publish_pypi == 'true' }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-pypi-skipped:
    needs: build
    if: ${{ !(vars.PUBLISH_PYPI == 'true' || github.event.inputs.publish_pypi == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - name: PyPI publish disabled
        run: |
          echo "PyPI publish step skipped."
          echo "Set repository variable PUBLISH_PYPI=true or run workflow_dispatch with publish_pypi=true."
