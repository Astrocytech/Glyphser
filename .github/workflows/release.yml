          GLYPHSER_MERKLE_STAGE="release-verify" \
          GLYPHSER_MERKLE_PREVIOUS_ROOT="${{ needs.build.outputs.merkle_root }}" \
          python tooling/security/rolling_merkle_checkpoints.py
          GLYPHSER_EXPECTED_PREVIOUS_MERKLE_ROOT="${{ needs.build.outputs.merkle_root }}" \
          python tooling/security/merkle_checkpoint_continuity_gate.py
          python tooling/security/tamper_cost_model_report.py
          python tooling/security/upload_artifact_immutable_index.py
          python tooling/security/security_event_export.py
          python tooling/security/security_event_schema_gate.py
          python tooling/security/telemetry_completeness_sli_gate.py
          python tooling/security/telemetry_timeliness_sli_gate.py
          python tooling/security/telemetry_integrity_sli_gate.py
          python tooling/security/security_slo_report.py
          python tooling/security/security_trend_gate.py
          python tooling/security/security_pipeline_reliability_dashboard.py
          python tooling/security/security_dashboard_export.py
          python tooling/security/security_posture_executive_summary.py
          python tooling/security/formal_security_review_artifact.py --strict-key
          python tooling/security/security_schema_normalization_gate.py
          python tooling/security/cosign_attestation_gate.py
          python tooling/security/release_rollback_provenance_gate.py

  publish-pypi:
    needs: [build, verify-signatures]
    if: ${{ vars.PUBLISH_PYPI == 'true' || github.event.inputs.publish_pypi == 'true' }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version: "3.12"
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine upload --non-interactive dist/*

  publish-pypi-skipped:
    needs: build
    if: ${{ !(vars.PUBLISH_PYPI == 'true' || github.event.inputs.publish_pypi == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - name: PyPI publish disabled
        run: |
          echo "PyPI publish step skipped."
          echo "Set repository variable PUBLISH_PYPI=true or run workflow_dispatch with publish_pypi=true."
