name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      publish_pypi:
        description: "Publish built artifacts to PyPI (requires trusted publishing setup)"
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@42375524a18f07eb0658ddf24b150a0f0f0b274f
        with:
          python-version: "3.12"
      - name: Build dist
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Generate release checksums
        run: |
          cd dist
          sha256sum * > CHECKSUMS.sha256
      - name: Generate SBOM and provenance
        env:
          GLYPHSER_STRICT_SIGNING: "true"
          GLYPHSER_PROVENANCE_HMAC_KEY: ${{ secrets.GLYPHSER_PROVENANCE_HMAC_KEY }}
        run: python tooling/security/security_artifacts.py
      - name: Verify provenance signatures (strict)
        env:
          GLYPHSER_PROVENANCE_HMAC_KEY: ${{ secrets.GLYPHSER_PROVENANCE_HMAC_KEY }}
        run: python tooling/security/provenance_signature_gate.py --strict-key
      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: dist
          path: |
            dist/
            evidence/security/sbom.json
            evidence/security/sbom.json.sig
            evidence/security/build_provenance.json
            evidence/security/build_provenance.json.sig
            evidence/security/provenance_signature.json

  verify-signatures:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@42375524a18f07eb0658ddf24b150a0f0f0b274f
        with:
          python-version: "3.12"
      - name: Re-generate and verify provenance signatures (strict)
        env:
          GLYPHSER_STRICT_SIGNING: "true"
          GLYPHSER_PROVENANCE_HMAC_KEY: ${{ secrets.GLYPHSER_PROVENANCE_HMAC_KEY }}
        run: |
          python tooling/security/security_artifacts.py
          python tooling/security/provenance_signature_gate.py --strict-key

  publish-pypi:
    needs: [build, verify-signatures]
    if: ${{ vars.PUBLISH_PYPI == 'true' || github.event.inputs.publish_pypi == 'true' }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@42375524a18f07eb0658ddf24b150a0f0f0b274f
        with:
          python-version: "3.12"
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine upload --non-interactive dist/*

  publish-pypi-skipped:
    needs: build
    if: ${{ !(vars.PUBLISH_PYPI == 'true' || github.event.inputs.publish_pypi == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - name: PyPI publish disabled
        run: |
          echo "PyPI publish step skipped."
          echo "Set repository variable PUBLISH_PYPI=true or run workflow_dispatch with publish_pypi=true."
