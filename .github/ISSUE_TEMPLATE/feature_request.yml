name: Feature request
about: Suggest an improvement to Glyphser
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What API/CLI shape should this take?
    validations:
      required: true
