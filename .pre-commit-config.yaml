repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff-check
        entry: ruff check .
        language: system
        pass_filenames: false
      - id: ruff-format-check
        name: ruff-format-check
        entry: ruff format --check .
        language: system
        pass_filenames: false
      - id: mypy
        name: mypy
        entry: mypy --config-file mypy.ini
        language: system
        pass_filenames: false
      - id: pytest-fast
        name: pytest-fast
        entry: pytest -q tests/public/test_public_api.py tests/public/test_public_cli.py
        language: system
        pass_filenames: false
