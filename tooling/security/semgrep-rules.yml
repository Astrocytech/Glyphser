rules:
  - id: glyphser.subprocess-shell-true
    patterns:
      - pattern-either:
          - pattern: $PROC.run(..., shell=True, ...)
          - pattern: $PROC.Popen(..., shell=True, ...)
    message: "Avoid shell=True in subprocess invocations; pass argv list and validate inputs."
    languages: [python]
    severity: ERROR

  - id: glyphser.dynamic-code-execution
    patterns:
      - pattern-either:
          - pattern: eval($EXPR)
          - pattern: exec($EXPR)
    message: "Dynamic code execution is not allowed in runtime/tooling paths."
    languages: [python]
    severity: ERROR

  - id: glyphser.unsafe-yaml-load
    patterns:
      - pattern: yaml.load($DATA, ...)
      - pattern-not: yaml.load($DATA, Loader=yaml.SafeLoader)
      - pattern-not: yaml.load($DATA, Loader=SafeLoader)
    message: "Use yaml.safe_load(...) or SafeLoader to avoid unsafe object construction."
    languages: [python]
    severity: ERROR

  - id: glyphser.path-traversal-archive-extractall
    pattern: $ARCH.extractall(...)
    message: "Archive extractall can enable path traversal; validate members before extraction."
    languages: [python]
    severity: ERROR

  - id: glyphser.unsafe-tempfile-mktemp
    pattern: tempfile.mktemp(...)
    message: "tempfile.mktemp is unsafe; use NamedTemporaryFile/delete=False or mkstemp."
    languages: [python]
    severity: ERROR

  - id: glyphser.permissive-file-mode
    patterns:
      - pattern-either:
          - pattern: os.chmod(..., 0o777)
          - pattern: os.chmod(..., 0o666)
          - pattern: $P.mkdir(..., mode=0o777, ...)
          - pattern: os.makedirs(..., mode=0o777, ...)
    message: "Overly permissive file modes are not allowed."
    languages: [python]
    severity: ERROR
